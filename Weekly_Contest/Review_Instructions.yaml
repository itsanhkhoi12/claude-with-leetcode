## How to Read the Solutions

- **Problem File:** Each `.py` file contains the solution with docstrings explaining:
  - Intuition behind the approach
  - Steps taken to solve the problem
  - Time and space complexity
- **Optional README per Contest:** Some contests include a `README.md` summarizing all problems.

