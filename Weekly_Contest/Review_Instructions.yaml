## Topic: Contest484

### Q1: Count Residue Prefixes
- **Intuition:** Track distinct characters in a prefix and compare with prefix length modulo 3.
- **Approach:** Iterate through the string, maintain a set of seen characters, and increment a counter if the condition is satisfied.
- **Time Complexity:** O(N)
- **Space Complexity:** O(1) extra space (set can contain at most 26 characters)

